name: Content Factory Orchestrator (Duplicate-Proof)

on:
  workflow_dispatch:         # Allows manual trigger

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Allows the bot to push files back to repo
      actions: write         # Required to read/write rolling artifact tracking pools

    steps:
      # 1. Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'


      # 3. Install lightweight dependencies
      - name: Install Dependencies
        run: |
         pip install requests openai yt-dlp requests[socks]
         python -m pip install --upgrade pip
         pip install playwright
         playwright install chromium --with-deps
         

      # 4. Process queue → generate pipeline_data.json
      - name: Process Queue & Generate Script
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone
          
          with open('reel_queue.json', 'r') as f:
              data = json.load(f)
          
          queue = data.get('queue', [])
          processed = {p['url'] for p in data.get('processed', [])}
          
          pick = None
          for r in queue:
              if 'www.instagram.com' in r['url']:
                  pick = r
                  break
          
          if not pick:
              print("✅ No new reels. Exiting.")
              exit(0)
          
          sc_match = re.search(r'/reel/([^/?]+)', pick['url'])
          sc = sc_match.group(1) if sc_match else "unknown"
          user = pick.get('username', 'unknown')
          
          with open('pipeline_data.json', 'w') as f:
            json.dump({
                 "reel_url": pick['url'], "shortcode": sc, "username": user,
                 "script_text": " ",
                  "youtube_title": f"AI Hack #shorts",
                  "youtube_description": f"Tip from @{user}. #ai",
                  "youtube_tags": ["AI","Shorts"]
              }, f, indent=2)
          
          data.setdefault('processed', []).append({
              "url": pick['url'], "username": user,
              "status": "in_progress", "started_at": datetime.now(timezone.utc).isoformat()
          })
          with open('reel_queue.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f"✅ Queued: {pick['url']}")
          EOF


      # 4a. Use genuine persistent browser context simulation to process downreels.com completely safely
      

      - name: Initialize Virtual Display Framebuffer
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          # Start Xvfb background display port 99
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

      # 4b. Use genuine browser simulation to process downreels.com completely safely
      - name: Cloud Download Video Asset via Playwright Simulation
        env:
          DISPLAY: :99
        run: |
          python3 << 'EOF'
          import json, os, subprocess, asyncio, shutil
          from playwright.async_api import async_playwright
          
          async def run_stealth_download():
              # 1. Extraction safety checks matching pipeline files
              if not os.path.exists('pipeline_data.json'):
                  print("ℹ️ pipeline_data.json missing. Skipping download cycle.")
                  return
                  
              with open('pipeline_data.json', 'r') as f:
                  pipeline = json.load(f)
              
              reel_url = pipeline.get('reel_url')
              shortcode = pipeline.get('shortcode', 'downloaded_reel')
              
              if not reel_url or "unknown" in reel_url:
                  print("❌ Missing video URL target path inside JSON queue.")
                  return
              
              # Storage Reset: Purges prior video files from the memory workspace
              if os.path.exists('downloads'):
                  shutil.rmtree('downloads')
                  print("🧹 Storage Reset: Prior video files completely purged from memory workspace.")
                  
              os.makedirs('downloads', exist_ok=True)
              output_path = f"downloads/reelforyoutube.mp4"
              
              print(f"🚀 Launching Chrome Engine for Downreels: {reel_url}")
              
              download_success = False
              
              async with async_playwright() as p:
                  # MATCHES JAVASCRIPT PERSISTENT CONTEXT ENVIRONMENT
                  browser_context = await p.chromium.launch_persistent_context(
                      user_data_dir="", 
                      headless=False,     
                      args=[
                          "--no-sandbox", 
                          "--disable-setuid-sandbox"
                      ],
                      accept_downloads=True,
                      viewport={'width': 1280, 'height': 800}
                  )
                  
                  # MATCHES JAVASCRIPT POPUP WINDOW CLOSER TO SUPPRESS ADS
                  async def handle_popup(popup):
                      try:
                          await popup.close()
                          print("🛡️ Suppressed ad network popup window.")
                      except Exception:
                          pass
                  browser_context.on("page", handle_popup)
                  
                  # EXTRACTS VALID FIRST PAGE FROM CONTEXT POOL
                  pages = browser_context.pages
                  page = pages[0] if len(pages) > 0 else await browser_context.new_page()
                  
                  try:
                      # 1. Open Downreels platform
                      await page.goto('https://downreels.com/', wait_until='domcontentloaded')
                      
                      # 2. Monitor and wait for the input textbox element
                      textbox = page.get_by_role('textbox', name='Paste Instagram Reel URL')
                      while True:
                          if await textbox.is_visible():
                              break
                          await asyncio.sleep(1)
                      
                      await textbox.click()
                      await textbox.fill(reel_url)
                      print("✏️ Link entered into the processing wrapper.")
        
                      # Click the initial submit button
                      await page.get_by_role('button', name='DOWNLOAD', exact=True).click()
                      print("⏳ Running server-side lookup on target reel...")
        
                      # 3. Monitor and wait for the Download HD MP4 element to render
                      download_btn = page.get_by_role('button', name='Download HD MP4')
                      while True:
                          if await download_btn.is_visible():
                              print("🎯 Layout event matched! Video ready for stream extraction.")
                              break
                          await asyncio.sleep(1)
        
                      # MATCHES JAVASCRIPT WORKFLOW: Spawns the download listener in the background before clicking
                      download_task = asyncio.create_task(page.wait_for_event("download", timeout=0))
                      
                      # Trigger the physical button click action
                      await download_btn.click()
                      
                      # Resolve the background download stream
                      download = await download_task
                      
                      # 4. Extract data and write bytes to destination folder
                      await download.save_as(output_path)
                      download_success = True
                      print(f"✅ Instagram media asset saved to runner file pipeline: {output_path}")
                      
                  except Exception as error:
                      print(f"❌ Automation routine caught failure exception: {error}")
                      try:
                          await page.screenshot(path='downloads/error-layout-screenshot.png', full_page=True)
                          print("📸 Saved failure screenshot to your workspace logs.")
                      except Exception:
                          pass
                  finally:
                      await browser_context.close()
              
              # Size check safety parameters
              if os.path.exists(output_path):
                  file_size = os.path.getsize(output_path)
                  if file_size > 50000:
                      print(f"🎉 Real video asset captured successfully! Size: {file_size / (1024*1024):.2f} MB")
                  else:
                      os.remove(output_path)
                      print("❌ Download output contains light text metrics instead of video data. Dropping placeholder.")
              else:
                  print("❌ Core system disk space rejected file creation execution.")

          asyncio.run(run_stealth_download())
          EOF
          
      # 5. Commit changes back to GitHub
      - name: Commit Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          # Force Git to look at deletions as well as additions inside the folder pool
          git add -A downloads/
          git add -f reel_queue.json pipeline_data.json
          
          if git diff-index --quiet HEAD --; then
            echo "ℹ️ No changes to commit."
          else
            git commit -m "Auto: Picked next reel & downloaded media asset [skip ci]"
            git push
          fi

      
      # ====================================================================
      # CROSS-RUN HISTORICAL ARTIFACT RECOVERY LOOP (PERMANENT FIX)
      # ====================================================================

      # 6. Search across ALL historical runs to find and download yesterday's active token state
      - name: Download Latest Historical Kaggle Session State
        uses: dawidd6/action-download-artifact@v9
        continue-on-error: true # Safe fallback if the entire history is clear
        with:
          name: kaggle-rolling-state
          search_artifacts: true  # CRITICAL: Forces GitHub to look outside the current run thread
          path: .                 # Base path execution root

      # 6a. FIX STEP: Flatten directory structures & verify valid cookie structures
      - name: Align and Validate Cookie State Pathing
        run: |
          # If the plugin dropped the file inside a folder named after the artifact, move it to the root
          if [ -f "./kaggle-rolling-state/state.json" ]; then
            mv ./kaggle-rolling-state/state.json ./state.json
            echo "🔄 Path Alignment: Moved state.json from nested artifact folder to root workspace."
          fi

          # Safety Check: If state.json doesn't exist, create a clean, valid empty fallback JSON object
          if [ ! -f "./state.json" ] || [ ! -s "./state.json" ]; then
            echo "{}" > ./state.json
            echo "⚠️ Warning: No valid historical state file found. Generated a clean fallback cookie template."
          else
            echo "✅ Valid rolling session cookie file detected in root workspace."
          fi

      # 7. Trigger Kaggle (Using Kaggle CLI & Playwright)
      - name: Trigger Kaggle Notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          KAGGLE_AUTH_JSON: ${{ secrets.KAGGLE_AUTH_JSON }}
        run: python3 trigger.py

      # 7a. FIX STEP: Guard against uploading empty or missing states if trigger.py errored out
      - name: Verify Newly Extracted Session Tokens
        if: always()
        run: |
          if [ ! -f "./state.json" ] || [ ! -s "./state.json" ]; then
            echo "⚠️ Post-Run Warning: state.json is missing or empty. Populating safety fallback to prevent breaking tomorrow's action run loop."
            echo "{}" > ./state.json
          fi

      # 8. Upload the freshly generated rolling session state so tomorrow's run can use it
      - name: Save Refreshed Kaggle Session State
        if: always() # Guarantees updated cookies register even if other pipeline steps fail
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-rolling-state
          path: state.json # Uploads the clean verified file from the root
          retention-days: 7
          overwrite: true  # CRITICAL: Forces GitHub actions to replace older historical blocks cleanly
